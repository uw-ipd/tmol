name: ~Build wheel template

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
        default: ubuntu-22.04
      container-image:
        required: true
        type: string
        description: "NGC PyTorch container (provides nvcc, torch, Python)"
      torch-version:
        required: true
        type: string
      cxx11_abi:
        required: true
        type: string
      pip-torch-cuda-url:
        required: false
        type: string
        default: ""
        description: >
          When non-empty, reinstall PyTorch from pip using this --index-url
          (e.g. https://download.pytorch.org/whl/cu124).
          Used for CXX11_ABI=FALSE builds where we need pip's torch (old ABI)
          but still use the NGC container's nvcc for compilation.
      upload-to-release:
        required: false
        type: boolean
        default: false
      release-version:
        required: false
        type: string

defaults:
  run:
    # Note: -u omitted because NGC container's /etc/bash.bashrc has unbound PS1
    shell: bash -x -e -o pipefail {0}

jobs:
  build-wheel:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.container-image }}
    name: Build (pt${{ inputs.torch-version }}-cxx11abi${{ inputs.cxx11_abi }})
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release-version }}
          submodules: recursive

      - name: Reinstall PyTorch from pip (ABI=FALSE)
        if: inputs.pip-torch-cuda-url != ''
        run: |
          echo "Replacing NGC PyTorch with pip PyTorch (CXX11_ABI=FALSE)"
          # Some NGC images pin torch via pip constraints; clear those to allow pip torch.
          pip config unset global.constraint || true
          export PIP_CONSTRAINT=""
          pip install --break-system-packages --force-reinstall --no-deps \
            torch==${{ inputs.torch-version }}.* \
            --index-url ${{ inputs.pip-torch-cuda-url }}
          # pip torch+cuXXX needs matching CUDA runtime libs from pip
          # (the NGC container may ship a different CUDA major version)
          pip install --break-system-packages \
            nvidia-cuda-runtime-cu12 nvidia-cublas-cu12 nvidia-cuda-nvrtc-cu12 \
            nvidia-cuda-cupti-cu12 nvidia-cudnn-cu12 nvidia-cufft-cu12 \
            nvidia-curand-cu12 nvidia-cusolver-cu12 nvidia-cusparse-cu12 \
            nvidia-nccl-cu12 nvidia-nvtx-cu12 nvidia-nvjitlink-cu12
          python3 -c "import torch; print(f'Reinstalled: PyTorch {torch.__version__}, CUDA {torch.version.cuda}, ABI={torch._C._GLIBCXX_USE_CXX11_ABI}')"

      - name: Set version variables
        run: |
          PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')")
          TORCH_VERSION=$(python3 -c "import torch; v=torch.__version__.split('.')[:2]; print(f'{v[0]}.{v[1]}')")
          CUDA_VERSION=$(python3 -c "import torch; print(torch.version.cuda.replace('.','')[:3])")

          echo "MATRIX_PYTHON_VERSION=${PYTHON_VERSION}" >> $GITHUB_ENV
          echo "MATRIX_TORCH_VERSION=${TORCH_VERSION}" >> $GITHUB_ENV
          echo "WHEEL_CUDA_VERSION=${CUDA_VERSION%%[0-9]}" >> $GITHUB_ENV

          # Verify the container has what we need
          nvcc --version
          python3 -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.version.cuda}')"

      - name: Install build dependencies
        run: |
          pip install --break-system-packages setuptools>=68 ninja packaging wheel psutil

      - name: Build wheel
        run: |
          export TMOL_FORCE_BUILD=TRUE
          export TMOL_FORCE_CXX11_ABI=${{ inputs.cxx11_abi }}
          # Include Blackwell (sm_100) native when CUDA >= 13; otherwise PTX-only.
          CUDA_MAJOR=$(python3 -c "import torch; print(torch.version.cuda.split('.')[0])")
          if [ "$CUDA_MAJOR" -ge 13 ]; then
            export TORCH_CUDA_ARCH_LIST="8.0 8.6 8.9 9.0 10.0+PTX"
          else
            export TORCH_CUDA_ARCH_LIST="8.0 8.6 8.9 9.0+PTX"
          fi
          # GitHub free runner: 2 vCPU, 7 GB RAM.
          # Each nvcc fatbinary compilation uses ~2-3 GB per thread.
          # MAX_JOBS=1 × NVCC_THREADS=2 = 2 concurrent nvcc threads ≈ 4-6 GB peak.
          export MAX_JOBS=1
          export NVCC_THREADS=2
          # Skip test extensions in wheel builds — tests are run separately
          export TMOL_SKIP_TEST_EXTS=TRUE

          python3 setup.py bdist_wheel --dist-dir=dist

          # Rename wheel with CUDA/torch/ABI tags
          tmpname=cu${WHEEL_CUDA_VERSION}torch${MATRIX_TORCH_VERSION}cxx11abi${{ inputs.cxx11_abi }}
          wheel_name=$(ls dist/*whl | xargs -n 1 basename | sed "s/-/+$tmpname-/2")
          ls dist/*whl | xargs -I {} mv {} dist/${wheel_name}
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV

      - name: Log built wheels
        run: ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-pt${{ inputs.torch-version }}-cxx11abi${{ inputs.cxx11_abi }}
          path: dist/*.whl

      - name: Upload to GitHub Release
        if: inputs.upload-to-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/${{ env.wheel_name }}
          asset_name: ${{ env.wheel_name }}
          asset_content_type: application/*
