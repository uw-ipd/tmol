# Full wheel build + TestPyPI upload.
# Triggers on push to precompiled_extensions branch.

name: Build and publish wheels

on:
  push:
    branches:
      - "kdidi/precompiled_extensions"
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "tmol/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build Wheel (${{ matrix.torch-version }}, cxx11abi=${{ matrix.cxx11_abi }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # PyTorch 2.5 — CUDA 12.6, Python 3.12
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
            cxx11_abi: "TRUE"
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
            cxx11_abi: "FALSE"
          # PyTorch 2.6 — CUDA 12.6, Python 3.12
          - container-image: nvcr.io/nvidia/pytorch:25.01-py3
            torch-version: "2.6"
            cxx11_abi: "TRUE"
          - container-image: nvcr.io/nvidia/pytorch:25.01-py3
            torch-version: "2.6"
            cxx11_abi: "FALSE"
          # PyTorch 2.7 — CUDA 12.8, Python 3.12
          - container-image: nvcr.io/nvidia/pytorch:25.04-py3
            torch-version: "2.7"
            cxx11_abi: "TRUE"
          - container-image: nvcr.io/nvidia/pytorch:25.04-py3
            torch-version: "2.7"
            cxx11_abi: "FALSE"
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ubuntu-22.04
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: ${{ matrix.cxx11_abi }}

  publish_sdist:
    name: Build sdist + upload to TestPyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install setuptools>=68 wheel twine setuptools-scm ninja
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist (no CUDA)
        env:
          TMOL_SKIP_CUDA_BUILD: "TRUE"
        run: python setup.py sdist --dist-dir=dist

      - name: Upload sdist to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: Upload wheels to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ wheels/*.whl || true
