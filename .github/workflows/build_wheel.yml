# CI wheel build — validates that extensions compile.
# Wheels saved as artifacts only (no upload).
# For publishing, use publish.yml (manual workflow_dispatch).
#
# Matrix: PyTorch 2.8, 2.9, 2.10 x ABI=TRUE
#   x86_64: cp312 (NGC native), cp312 Colab (cu128), cp310 (pip torch cu126)
#   ARM64:  cp312 (NGC native)
#   CPU:    cp312 (no CUDA, any platform)
#
# Each NGC container pins a CUDA toolkit (nvcc) version used for compilation.
# When pip-torch-cuda-url is set, PyTorch is reinstalled from pip on top of
# the NGC container, keeping the container's nvcc for compilation.
# Since PyTorch 2.6+, cu126/cu128 pip wheels are all CXX11_ABI=TRUE.

name: Build wheels (CI)

on:
  push:
    branches: [master, "kdidi/**"]
    paths:
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "tmol/**"
      - ".github/workflows/**"
      - "MANIFEST.in"
  workflow_dispatch:

jobs:
  # ── GPU wheels (CUDA) ──────────────────────────────────────────────
  build_wheels:
    name: "${{ matrix.label }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          # ═══════════════════════════════════════════════════════════════
          # x86_64 — cp312 (NGC PyTorch, native)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.8 x86_64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:25.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.9 x86_64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.10 x86_64 NGC"

          # ═══════════════════════════════════════════════════════════════
          # x86_64 — Colab (NGC 25.02 = CUDA 12.8, pip torch 2.10 cu128)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:25.02-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu128"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.10 x86_64 Colab cu128"

          # ═══════════════════════════════════════════════════════════════
          # ARM64 — cp312 (NGC PyTorch, native)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-24.04-arm
            label: "cp312 pt2.8 aarch64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:25.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-24.04-arm
            label: "cp312 pt2.9 aarch64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-24.04-arm
            label: "cp312 pt2.10 aarch64 NGC"

          # ═══════════════════════════════════════════════════════════════
          # x86_64 — cp310 (NGC 24.10, pip torch cu126)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
            runs-on: ubuntu-22.04
            python-version: "310"
            label: "cp310 pt2.8 x86_64 cu126"
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
            runs-on: ubuntu-22.04
            python-version: "310"
            label: "cp310 pt2.9 x86_64 cu126"
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
            runs-on: ubuntu-22.04
            python-version: "310"
            label: "cp310 pt2.10 x86_64 cu126"

          # ARM64 cp310: removed — pip doesn't publish ARM CUDA wheels.
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ${{ matrix.runs-on }}
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: ${{ matrix.cxx11_abi }}
      label: ${{ matrix.label }}
      python-version: ${{ matrix.python-version || '312' }}
      pip-torch-cuda-url: ${{ matrix.pip-torch-cuda-url || '' }}

  # ── CPU-only wheel ─────────────────────────────────────────────────
  build_cpu_wheel:
    name: Build Wheel (CPU-only, pt2.10, cp312)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install 'scikit-build-core>=0.10' ninja 'packaging>=24.2' 'pybind11>=2.12'

      - name: Build wheel
        run: |
          pip wheel . --no-build-isolation --no-deps -w dist \
            -Ccmake.define.TMOL_ENABLE_CUDA=OFF

      - name: Rename wheel with CPU tag
        run: |
          cd dist
          for whl in *.whl; do
            new_name=$(echo "$whl" | sed 's/-/+cpu-/2')
            mv "$whl" "$new_name"
            echo "Renamed: $whl -> $new_name"
          done

      - name: Log built wheels
        run: ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cp312-cpu-x86_64
          path: dist/*.whl
