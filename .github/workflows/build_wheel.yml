# CI wheel build — validates that extensions compile.
# Wheels saved as artifacts only (no upload).
# For publishing, use publish.yml (manual workflow_dispatch).
#
# Matrix: PyTorch 2.8, 2.9, 2.10 — both ABI=TRUE and ABI=FALSE.
#   ABI=TRUE  — NGC PyTorch (conda, source-built, NGC containers)
#   ABI=FALSE — pip PyTorch (bare metal: pip install torch)
#
# Each NGC container pins a CUDA toolkit (nvcc) version used for compilation.
# For ABI=FALSE, pip torch is reinstalled on top of the NGC container
# to get old-ABI libtorch while keeping nvcc for compilation.

name: Build wheels (CI)

on:
  push:
    branches:
      - "kdidi/precompiled_extensions"
      - "kdidi/jit_and_precompiled"
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "tmol/**"
      - ".github/workflows/**"
      - "MANIFEST.in"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build Wheel (${{ matrix.torch-version }}, abi=${{ matrix.cxx11_abi }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── CXX11 ABI = TRUE (NGC / conda / source-built PyTorch) ──
          # PyTorch 2.8 — NGC 25.06 (CUDA 12.6)
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
          # PyTorch 2.9 — NGC 25.10 (CUDA 13.0)
          - container-image: nvcr.io/nvidia/pytorch:25.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
          # PyTorch 2.10 — NGC 26.01 (CUDA 13.1)
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"

          # ── CXX11 ABI = FALSE (pip install torch) ──
          # Uses NGC container for nvcc, but reinstalls torch from pip (old ABI).
          # Container must have nvcc matching pip torch's CUDA version.
          # PyTorch 2.8 — pip torch cu126 (nvcc 12.6 from NGC 25.06)
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
            cxx11_abi: "FALSE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
          # PyTorch 2.9 — pip torch cu126 (nvcc 12.6 from NGC 25.06)
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.9"
            cxx11_abi: "FALSE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
          # PyTorch 2.10 — pip torch cu126 (nvcc 12.6 from NGC 25.06)
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.10"
            cxx11_abi: "FALSE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ubuntu-22.04
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: ${{ matrix.cxx11_abi }}
      pip-torch-cuda-url: ${{ matrix.pip-torch-cuda-url || '' }}
