    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: wheel-cp${{ matrix.python-tag }}-pt${{ matrix.torch-minor }}-cu${{ matrix.cuda-tag }}-${{ matrix.arch }}
          path: wheels

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify filename and install wheel
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(wheels/*.whl)
          test "${#wheels[@]}" -eq 1
          wheel_name=$(basename "${wheels[0]}")
          expected="tmol-*+cu${{ matrix.cuda-tag }}torch${{ matrix.torch-minor }}-cp${{ matrix.python-tag }}-cp${{ matrix.python-tag }}-linux_${{ matrix.arch }}.whl"
          case "$wheel_name" in
            $expected) ;;
            *)
              echo "Unexpected wheel filename: $wheel_name (expected $expected)"
              exit 1
              ;;
          esac
          python -m pip install --upgrade pip
          python -m pip install "torch==${{ matrix.torch-version }}" \
            --index-url "${{ matrix.torch-index-url }}"
          python -m pip install "${wheels[0]}"

      - name: Load native extensions
        working-directory: /tmp
        run: |
          python - <<'PY'
          import importlib.metadata
          import os
          import re
          import tomllib
          from pathlib import Path

          import torch
          import tmol
          from packaging.requirements import Requirement
          from packaging.utils import canonicalize_name
          from tmol._cpp_lib import _ensure_loaded

          expected_torch = "${{ matrix.torch-minor }}"
          expected_cuda = "${{ matrix.cuda-tag }}"
          actual_torch = ".".join(torch.__version__.split(".")[:2])
          actual_cuda = re.sub(r"[^0-9]", "", torch.version.cuda or "")[:3]
          assert actual_torch == expected_torch, (actual_torch, expected_torch)
          assert actual_cuda == expected_cuda, (actual_cuda, expected_cuda)

          pyproject_path = Path(os.environ["GITHUB_WORKSPACE"]) / "pyproject.toml"
          project = tomllib.loads(pyproject_path.read_text())
          expected_dependencies = {
              canonicalize_name(Requirement(value).name)
              for value in project["project"]["dependencies"]
          }
          wheel_dependencies = {
              canonicalize_name(Requirement(value).name)
              for value in importlib.metadata.requires("tmol") or []
              if "extra ==" not in value
          }
          assert wheel_dependencies == expected_dependencies, (
              wheel_dependencies ^ expected_dependencies
          )

          _ensure_loaded()
          print("tmol", tmol.__version__)
          print("torch", torch.__version__, "cuda", torch.version.cuda)
          print("dependencies", sorted(wheel_dependencies))
          PY
