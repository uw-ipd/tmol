name: Wheel smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - fix/torch-2.13-wheels
      - fix/manylinux-wheels

concurrency:
  group: wheel-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            python-tag: "311"
            torch-version: "2.12"
            torch-package-version: "2.12.0"
            torch-index-url: "https://download.pytorch.org/whl/cu132"
            local-tag: "cu132torch2.12"
            enable-cuda: true
            container-image: nvcr.io/nvidia/pytorch:26.04-py3
            runs-on: ubuntu-22.04
            arch: x86_64
            label: "smoke py3.11 pt2.12 cu132 x86_64"
          - python-version: "3.12"
            python-tag: "312"
            torch-version: "2.8"
            torch-package-version: "2.8.0"
            torch-index-url: "https://download.pytorch.org/whl/cu129"
            local-tag: "cu129torch2.8"
            enable-cuda: true
            container-image: nvcr.io/nvidia/pytorch:25.06-py3
            runs-on: ubuntu-22.04
            arch: x86_64
            gpu-runtime: true
            label: "smoke py3.12 pt2.8 cu129 x86_64"
