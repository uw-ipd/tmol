# Build wheels for all supported configurations and publish on tag push.
#
# Wheels are uploaded to GitHub Releases.
# The sdist (source only, no CUDA) is uploaded to PyPI.
#
# Uses NGC PyTorch containers which provide nvcc + torch + Python,
# so no separate CUDA/Python/torch installation steps are needed.

name: Build wheels and publish

on:
  push:
    tags:
      - "v*"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.extract_tag.outputs.tag }}
    steps:
      - name: Get tag
        id: extract_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag }}
          release_name: ${{ steps.extract_tag.outputs.tag }}

  build_wheels:
    name: Build Wheel
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        # Each NGC container pins a specific Python + CUDA + PyTorch version.
        # The CXX11 ABI flag controls whether to match nvcr (TRUE) or pip torch (FALSE).
        include:
          # PyTorch 2.5 — CUDA 12.6, Python 3.12
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
            cxx11_abi: "TRUE"
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
            cxx11_abi: "FALSE"
          # PyTorch 2.6 — CUDA 12.6, Python 3.12
          - container-image: nvcr.io/nvidia/pytorch:25.01-py3
            torch-version: "2.6"
            cxx11_abi: "TRUE"
          - container-image: nvcr.io/nvidia/pytorch:25.01-py3
            torch-version: "2.6"
            cxx11_abi: "FALSE"
          # PyTorch 2.7 — CUDA 12.8, Python 3.12
          - container-image: nvcr.io/nvidia/pytorch:25.04-py3
            torch-version: "2.7"
            cxx11_abi: "TRUE"
          - container-image: nvcr.io/nvidia/pytorch:25.04-py3
            torch-version: "2.7"
            cxx11_abi: "FALSE"
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ubuntu-22.04
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: ${{ matrix.cxx11_abi }}
      release-version: ${{ needs.create_release.outputs.release-version }}
      upload-to-release: true

  publish_sdist:
    name: Publish sdist to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install setuptools>=68 wheel twine setuptools-scm ninja
          # CPU-only torch for sdist creation (no CUDA compilation)
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist (no CUDA)
        env:
          TMOL_SKIP_CUDA_BUILD: "TRUE"
        run: python setup.py sdist --dist-dir=dist

      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      # Uncomment below (and remove TestPyPI step above) for real PyPI releases:
      # - name: Upload to PyPI
      #   env:
      #     TWINE_USERNAME: "__token__"
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: python -m twine upload dist/*
