# Publish wheels + sdist to TestPyPI (or PyPI).
#
# Trigger: manual workflow_dispatch only.
# Optionally also runs on tag pushes (uncomment the tag trigger below).
#
# Three separate jobs so you can RE-RUN just the upload if it fails
# without rebuilding wheels/sdist.

name: Publish to TestPyPI

on:
  push:
    branches:
      - "kdidi/precompiled_extensions"
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "tmol/**"
      - ".github/workflows/**"
      - "MANIFEST.in"
  workflow_dispatch:
    inputs:
      version_override:
        description: >
          Explicit version string (e.g. "0.1.0").
          Leave blank to use setuptools-scm (git-based version).
        required: false
        type: string
  # Uncomment to also trigger on version tags:
  # push:
  #   tags:
  #     - "v*"

jobs:
  # ── Job 1: Build wheels ─────────────────────────────────────────────
  build_wheels:
    name: Build Wheel (${{ matrix.torch-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # PyTorch 2.5 — CUDA 12.6
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
          # PyTorch 2.8 — CUDA 12.9
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
          # PyTorch 2.10 — CUDA 13.1 (latest NGC)
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ubuntu-22.04
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: "TRUE"

  # ── Job 2: Build sdist ──────────────────────────────────────────────
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "setuptools>=68" wheel setuptools-scm ninja
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist
        env:
          TMOL_SKIP_CUDA_BUILD: "TRUE"
          TMOL_SKIP_TEST_EXTS: "TRUE"
        run: |
          # If a manual version was provided, override setuptools-scm
          if [ -n "${{ inputs.version_override }}" ]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version_override }}"
          fi
          python setup.py sdist --dist-dir=dist

      - name: Log sdist
        run: ls -lh dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Job 3: Upload to TestPyPI ───────────────────────────────────────
  #
  # This job only downloads artifacts + uploads.  If it fails (e.g. 400
  # from PyPI) you can RE-RUN just this job without rebuilding anything.
  upload:
    name: Upload to TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: List all packages
        run: |
          echo "=== sdist ==="
          ls -lh dist/
          echo "=== wheels ==="
          ls -lh wheels/ || echo "(no wheels)"

      - name: Upload sdist to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Upload wheels to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if ls wheels/*.whl 1>/dev/null 2>&1; then
            python -m twine upload --repository-url https://test.pypi.org/legacy/ wheels/*.whl
          else
            echo "No wheels found — skipping wheel upload"
          fi

      # Uncomment for real PyPI releases:
      # - name: Upload to PyPI
      #   env:
      #     TWINE_USERNAME: "__token__"
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: python -m twine upload dist/* wheels/*.whl
