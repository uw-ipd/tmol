# Build wheels for all supported configurations and publish on tag push.
#
# Wheels are uploaded to GitHub Releases.
# The sdist (source only, no CUDA) is uploaded to TestPyPI.
#
# Uses NGC PyTorch containers which provide nvcc + torch + Python.

name: Build wheels and publish

on:
  push:
    tags:
      - "v*"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.extract_tag.outputs.tag }}
    steps:
      - name: Get tag
        id: extract_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag }}
          release_name: ${{ steps.extract_tag.outputs.tag }}

  build_wheels:
    name: Build Wheel
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        include:
          # PyTorch 2.5 — CUDA 12.6
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
          # PyTorch 2.8 — CUDA 12.9
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
          # PyTorch 2.10 — CUDA 13.1 (latest NGC)
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ubuntu-22.04
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: "TRUE"
      release-version: ${{ needs.create_release.outputs.release-version }}
      upload-to-release: true

  publish_sdist:
    name: Publish sdist to TestPyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install setuptools>=68 wheel twine setuptools-scm ninja
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist (no CUDA)
        env:
          TMOL_SKIP_CUDA_BUILD: "TRUE"
        run: python setup.py sdist --dist-dir=dist

      - name: Upload sdist to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: Upload wheels to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ wheels/*.whl || true

      # Uncomment below (and remove TestPyPI steps above) for real PyPI releases:
      # - name: Upload to PyPI
      #   env:
      #     TWINE_USERNAME: "__token__"
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: python -m twine upload dist/* wheels/*.whl
