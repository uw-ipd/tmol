# Publish sdist to TestPyPI + wheels to GitHub Release.
#
# Runs on push to kdidi/jit_and_precompiled or manual trigger.
# Safe to run on every push: TestPyPI rejects duplicate versions,
# so the upload step is a no-op if the version already exists.
#
# PyPI/TestPyPI rejects wheel filenames with "+" local version segments
# (e.g. +cu12torch2.5), so wheels are distributed via GitHub Releases
# and installed with: pip install tmol --find-links <release-url>
#
# Three separate jobs so you can RE-RUN just the upload if it fails
# without rebuilding wheels/sdist.

name: Publish to TestPyPI

on:
  push:
    branches: [main, "kdidi/**"]
  workflow_dispatch:

jobs:
  # ── Job 1a: Build GPU wheels ────────────────────────────────────────
  build_wheels:
    name: "${{ matrix.label }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          # ═══════════════════════════════════════════════════════════════
          # x86_64 — cp312 (NGC PyTorch, native)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.8 x86_64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:25.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.9 x86_64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.10 x86_64 NGC"

          # ═══════════════════════════════════════════════════════════════
          # x86_64 — Colab (NGC 25.02 = CUDA 12.8, pip torch 2.10 cu128)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:25.02-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu128"
            runs-on: ubuntu-22.04
            label: "cp312 pt2.10 x86_64 Colab cu128"

          # ═══════════════════════════════════════════════════════════════
          # ARM64 — cp312 (NGC PyTorch, native)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-24.04-arm
            label: "cp312 pt2.8 aarch64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:25.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-24.04-arm
            label: "cp312 pt2.9 aarch64 NGC"
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            runs-on: ubuntu-24.04-arm
            label: "cp312 pt2.10 aarch64 NGC"

          # ═══════════════════════════════════════════════════════════════
          # x86_64 — cp310 (NGC 24.10, pip torch cu126)
          # ═══════════════════════════════════════════════════════════════
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.8"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
            runs-on: ubuntu-22.04
            label: "cp310 pt2.8 x86_64 cu126"
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.9"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
            runs-on: ubuntu-22.04
            label: "cp310 pt2.9 x86_64 cu126"
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.10"
            cxx11_abi: "TRUE"
            pip-torch-cuda-url: "https://download.pytorch.org/whl/cu126"
            runs-on: ubuntu-22.04
            label: "cp310 pt2.10 x86_64 cu126"

          # ARM64 cp310: removed — pip doesn't publish ARM CUDA wheels.
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ${{ matrix.runs-on }}
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: ${{ matrix.cxx11_abi }}
      label: ${{ matrix.label }}
      pip-torch-cuda-url: ${{ matrix.pip-torch-cuda-url || '' }}

  # ── Job 1b: Build CPU-only wheel ──────────────────────────────────
  build_cpu_wheel:
    name: Build Wheel (CPU-only, pt2.10, cp312)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install 'scikit-build-core>=0.10' ninja 'packaging>=24.2' 'pybind11>=2.12'

      - name: Build wheel
        run: |
          pip wheel . --no-build-isolation --no-deps -w dist \
            -Ccmake.define.TMOL_ENABLE_CUDA=OFF

      - name: Rename wheel with CPU tag
        run: |
          cd dist
          for whl in *.whl; do
            new_name=$(echo "$whl" | sed 's/-/+cpu-/2')
            mv "$whl" "$new_name"
            echo "Renamed: $whl -> $new_name"
          done

      - name: Log built wheels
        run: ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cp312-cpu-x86_64
          path: dist/*.whl

  # ── Job 2: Build sdist ──────────────────────────────────────────────
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "scikit-build-core>=0.10" ninja "packaging>=24.2" "pybind11>=2.12" build
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist
        run: python -m build --sdist --no-isolation --outdir dist

      - name: Log sdist
        run: ls -lh dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Job 3: Upload ──────────────────────────────────────────────────
  #
  # sdist → TestPyPI  (no local version segment, PyPI accepts it)
  # wheels → GitHub Release  (local version +cu... is fine here)
  #
  # If this job fails you can RE-RUN just this job from the Actions UI.
  upload:
    name: Upload sdist to TestPyPI + wheels to GitHub Release
    needs: [build_wheels, build_cpu_wheel, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      # ── Download artifacts ──
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: List all packages
        run: |
          echo "=== sdist ==="
          ls -lh dist/
          echo "=== wheels ==="
          ls -lh wheels/ || echo "(no wheels)"

      # ── Upload sdist to TestPyPI ──
      - name: Upload sdist to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ dist/*

      # ── Upload wheels to a GitHub Release ──
      - name: Determine version from sdist filename
        id: version
        run: |
          SDIST=$(ls dist/*.tar.gz | head -1 | xargs basename)
          VERSION=$(echo "$SDIST" | sed 's/^tmol-//;s/\.tar\.gz$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Create or get GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: true
          generate_release_notes: false
          files: wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Uncomment for real PyPI releases (sdist only):
      # - name: Upload sdist to PyPI
      #   env:
      #     TWINE_USERNAME: "__token__"
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: python -m twine upload dist/*
