# Publish sdist to TestPyPI + wheels to GitHub Release.
#
# PyPI/TestPyPI rejects wheel filenames with "+" local version segments
# (e.g. +cu12torch2.5), so wheels are distributed via GitHub Releases
# and installed with: pip install tmol --find-links <release-url>
#
# Three separate jobs so you can RE-RUN just the upload if it fails
# without rebuilding wheels/sdist.

name: Publish to TestPyPI

on:
  push:
    branches:
      - "kdidi/precompiled_extensions"
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "tmol/**"
      - ".github/workflows/**"
      - "MANIFEST.in"
  workflow_dispatch:
    inputs:
      version_override:
        description: >
          Explicit version string (e.g. "0.1.0").
          Leave blank to use setuptools-scm (git-based version).
        required: false
        type: string

jobs:
  # ── Job 1: Build wheels ─────────────────────────────────────────────
  build_wheels:
    name: Build Wheel (${{ matrix.torch-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # PyTorch 2.5 — CUDA 12.6
          - container-image: nvcr.io/nvidia/pytorch:24.10-py3
            torch-version: "2.5"
          # PyTorch 2.8 — CUDA 12.9
          - container-image: nvcr.io/nvidia/pytorch:25.06-py3
            torch-version: "2.8"
          # PyTorch 2.10 — CUDA 13.1 (latest NGC)
          - container-image: nvcr.io/nvidia/pytorch:26.01-py3
            torch-version: "2.10"
    uses: ./.github/workflows/_build_wheel.yml
    with:
      runs-on: ubuntu-22.04
      container-image: ${{ matrix.container-image }}
      torch-version: ${{ matrix.torch-version }}
      cxx11_abi: "TRUE"

  # ── Job 2: Build sdist ──────────────────────────────────────────────
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "setuptools>=68" wheel setuptools-scm ninja
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist
        env:
          TMOL_SKIP_CUDA_BUILD: "TRUE"
          TMOL_SKIP_TEST_EXTS: "TRUE"
        run: |
          # If a manual version was provided, override setuptools-scm
          if [ -n "${{ inputs.version_override }}" ]; then
            export SETUPTOOLS_SCM_PRETEND_VERSION="${{ inputs.version_override }}"
          fi
          python setup.py sdist --dist-dir=dist

      - name: Log sdist
        run: ls -lh dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Job 3: Upload ──────────────────────────────────────────────────
  #
  # sdist → TestPyPI  (no local version segment, PyPI accepts it)
  # wheels → GitHub Release  (local version +cu... is fine here)
  #
  # If this job fails you can RE-RUN just this job from the Actions UI.
  upload:
    name: Upload sdist to TestPyPI + wheels to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      # ── Download artifacts ──
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: List all packages
        run: |
          echo "=== sdist ==="
          ls -lh dist/
          echo "=== wheels ==="
          ls -lh wheels/ || echo "(no wheels)"

      # ── Upload sdist to TestPyPI ──
      - name: Upload sdist to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      # ── Upload wheels to a GitHub Release ──
      # Creates (or reuses) a release named after the sdist version.
      - name: Determine version from sdist filename
        id: version
        run: |
          SDIST=$(ls dist/*.tar.gz | head -1 | xargs basename)
          # tmol-0.0.2.post1.dev230.tar.gz → 0.0.2.post1.dev230
          VERSION=$(echo "$SDIST" | sed 's/^tmol-//;s/\.tar\.gz$//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Create or get GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: true
          generate_release_notes: false
          files: wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Uncomment for real PyPI releases (sdist only):
      # - name: Upload sdist to PyPI
      #   env:
      #     TWINE_USERNAME: "__token__"
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: python -m twine upload dist/*
