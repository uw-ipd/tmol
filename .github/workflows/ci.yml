# CI pipeline — runs inside Apptainer (NGC PyTorch) on a self-hosted GPU runner.
#
# The self-hosted runner runs bare metal on fela; each step executes inside
# the Apptainer SIF image via `apptainer exec --nv` for GPU access.
# An apptainer instance with --writable-tmpfs keeps pip installs and built
# extensions available across all steps within the job.

name: CI

on:
  push:
    branches: [main, "kdidi/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use NGC 24.10 (PyTorch 2.5, CUDA 12.4) — last version with V100 (sm_70) support.
  # NGC 25.06+ dropped V100 (minimum capability 7.5).
  SIF: /net/software/containers/versions/modelhub/pytorch_24.10-py3.sif
  INSTANCE_NAME: ci-${{ github.run_id }}

jobs:
  ci:
    runs-on: [self-hosted, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Start Apptainer instance
        run: |
          # Persistent pip cache on /net/scratch — no overlay or tmpfs needed.
          mkdir -p /net/scratch/kdidi/ci-pip-pkgs
          # GPU selection is done inside each step's heredoc (export CUDA_VISIBLE_DEVICES=...)
          # because --env on apptainer doesn't reliably propagate.
          apptainer instance start --nv \
            --bind /net/scratch/kdidi/ci-pip-pkgs:/ci-pip-pkgs \
            $SIF $INSTANCE_NAME

      - name: Setup
        run: |
          apptainer exec --pwd $GITHUB_WORKSPACE instance://$INSTANCE_NAME bash << 'EOF'
          set -ex
          export CUDA_VISIBLE_DEVICES=1
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          # Install packages to /ci-pip-pkgs (bind-mounted from /net/scratch).
          # No overlay needed — writes go straight to disk.
          export PYTHONUSERBASE=/ci-pip-pkgs
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$GITHUB_WORKSPACE:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH

          # Install uv if not present (persists across runs)
          command -v uv >/dev/null 2>&1 || pip install --user uv

          # Use the container's installed packages as constraints so uv
          # resolves to matching versions and doesn't try to replace them.
          # Exclude pandas/scipy — their pinned versions may conflict with
          # the container's numpy; let uv resolve compatible versions.
          pip freeze | grep -vE '(file://|^-e |^#|^pandas==|^scipy==)' > /tmp/container_pins.txt
          uv pip compile pyproject.toml --all-extras \
            --constraint /tmp/container_pins.txt \
            --output-file /tmp/requirements.txt

          # Filter out packages provided by the NGC base image
          grep -vE "^(torch(|vision|audio)|numpy|nvidia-.*|triton|tensorrt|pynvml|pandas|scipy)==" \
            /tmp/requirements.txt > /tmp/to_install.txt

          # Install missing deps to the bind-mounted directory.
          # Use --prefix (not --target) so bin/ scripts are created for CLI tools.
          uv pip install --prefix /ci-pip-pkgs --python /usr/bin/python3 --break-system-packages \
            -r /tmp/to_install.txt 'packaging>=24.2'

          # Clean stale build artifacts from previous (potentially failed) builds
          rm -rf build/

          # Build C++/CUDA extensions AOT using the container's own torch + nvcc
          # fela: 56 cores / 251GB RAM, 23 extension modules, 3 GPU arch targets.
          export CUDA_HOME=${CUDA_HOME:-/usr/local/cuda}
          # Override container's default — include sm_70 for fela's V100.
          export TORCH_CUDA_ARCH_LIST="7.0 8.0 9.0+PTX"
          MAX_JOBS=12 NVCC_THREADS=2 python setup.py build_ext --inplace
          EOF

      - name: Lint
        continue-on-error: true
        run: |
          apptainer exec --pwd $GITHUB_WORKSPACE instance://$INSTANCE_NAME bash << 'EOF'
          set -ex
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$PWD:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH
          pre-commit install
          pre-commit run --all-files --show-diff-on-failure || echo "::warning::pre-commit found issues"
          flake8 || echo "::warning::flake8 found issues"
          EOF

      - name: Test CPU
        continue-on-error: true
        run: |
          apptainer exec --pwd $GITHUB_WORKSPACE instance://$INSTANCE_NAME bash << 'EOF'
          set -ex
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$PWD:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH

          echo "--- environment"
          python --version
          python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.version.cuda}')"

          echo "+++ tests (CPU only)"
          CUDA_VISIBLE_DEVICES="" pytest -s -v --durations=25 --cov=./tmol --junitxml=testing.cpu.junit.xml -k "not cuda"
          EOF

      - name: Upload CPU test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cpu
          path: testing.cpu.junit.xml

      - name: Test CUDA
        continue-on-error: true
        run: |
          apptainer exec --pwd $GITHUB_WORKSPACE instance://$INSTANCE_NAME bash << 'EOF'
          set -ex
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          # Use V100s (GPUs 1,2, sm_70) — supported by PyTorch 2.5 (24.10 container).
          # Skip RTX 4000 (GPU 0) which is occupied by vLLM.
          export CUDA_VISIBLE_DEVICES=1,2
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$PWD:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH

          echo "--- environment"
          python --version
          python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.version.cuda}, GPUs: {torch.cuda.device_count()}')"

          echo "--- nvidia-smi"
          nvidia-smi || true

          echo "+++ tests (CUDA only)"
          pytest -s -v --durations=25 --cov=./tmol --junitxml=testing.cuda.junit.xml -k "cuda"
          EOF

      - name: Upload CUDA test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cuda
          path: testing.cuda.junit.xml

      - name: Benchmark
        continue-on-error: true
        run: |
          apptainer exec --pwd $GITHUB_WORKSPACE instance://$INSTANCE_NAME bash << 'EOF'
          set -ex
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export CUDA_VISIBLE_DEVICES=1,2
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$PWD:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH

          BENCHMARK_DIR=benchmark/${{ github.repository }}/${{ github.ref_name }}
          BENCHMARK_RESULT=${BENCHMARK_DIR}/${{ github.run_number }}.json
          mkdir -p $BENCHMARK_DIR

          echo "--- Benchmark Run"
          pytest --benchmark-enable --benchmark-only \
            --benchmark-name=short --benchmark-sort=fullname \
            --benchmark-columns=ops,mean,iqr \
            --benchmark-json=${BENCHMARK_RESULT} \
            --benchmark-max-time=.1

          echo "+++ Benchmark Summary"
          pytest-benchmark compare --name=short --sort=fullname \
            --columns=ops,mean,iqr $(find benchmark -name '*.json')
          EOF

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark/**/*

      - name: Test CUDA (JIT)
        continue-on-error: true
        run: |
          apptainer exec --pwd $GITHUB_WORKSPACE instance://$INSTANCE_NAME bash << 'EOF'
          set -ex
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export CUDA_VISIBLE_DEVICES=1,2
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$PWD:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH
          export TMOL_USE_JIT=1

          echo "+++ tests (CUDA JIT)"
          pytest -s -v --durations=25 --cov=./tmol --junitxml=testing.cuda.jit.junit.xml
          EOF

      - name: Upload JIT test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cuda-jit
          path: testing.cuda.jit.junit.xml

      - name: Stop Apptainer instance
        if: always()
        run: apptainer instance stop $INSTANCE_NAME || true


