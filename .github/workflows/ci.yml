# CI — one job on the fela self-hosted runner (user bench).
#
# Separate GitHub Actions steps for lint / build / CPU / GPU / benchmark.
# Build + GPU lanes use a single gpu-train srun each; CPU pytest runs on the
# runner (no Slurm) so SLURM_GRES cannot leak into a cpu-partition job.

name: CI

on:
  push:
    branches: [master, "kdidi/**"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SIF: /home/bench/git_ci_apptainer/tmol.sif
  SLURM_PARTITION: gpu-train
  SLURM_GRES: gpu:1
  SLURM_CPUS_PER_TASK: 16
  SLURM_MEM: 128G
  SLURM_TIME: 06:00:00
  SRUN_GPU_MAX_ATTEMPTS: 5
  SRUN_GPU_RETRY_SLEEP: 10

jobs:
  ci:
    name: ci
    runs-on: [self-hosted, gpu]
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - run: .github/ci/restore_source_timestamps.sh
      - run: .github/ci/setup_ci_venv.sh

      - name: lint
        run: |
          apptainer exec --nv --fakeroot --containall \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --pwd "$GITHUB_WORKSPACE" \
            "$SIF" bash <<'LINT'
          set -ex
          source .venv/bin/activate
          uv pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure
          LINT

      - name: build
        env:
          GPU_ALLOC_SENTINEL: ${{ github.workspace }}/.gpu_alloc_build
        run: |
          rm -f "$GPU_ALLOC_SENTINEL"
          .github/ci/srun_gpu_retry.sh <<SCRIPT
          apptainer exec --nv --fakeroot --containall \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --pwd "$GITHUB_WORKSPACE" \
            --env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            --env GPU_ALLOC_SENTINEL="$GPU_ALLOC_SENTINEL" \
            "$SIF" bash <<'BUILD'
          set -ex
          # shellcheck source=/dev/null
          source .github/ci/gpu_env.sh
          touch_gpu_sentinel
          strip_cuda_compat_from_ld_path
          .github/ci/build_package.sh
          BUILD
          SCRIPT

      - name: test (cpu)
        run: |
          apptainer exec --fakeroot --containall \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --pwd "$GITHUB_WORKSPACE" \
            --env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            "$SIF" bash <<'CPU'
          set -ex
          .github/ci/run_cpu_tests.sh
          CPU

      - name: test (cuda)
        env:
          GPU_ALLOC_SENTINEL: ${{ github.workspace }}/.gpu_alloc_cuda
        run: |
          rm -f "$GPU_ALLOC_SENTINEL"
          .github/ci/srun_gpu_retry.sh <<SCRIPT
          apptainer exec --nv --fakeroot --containall \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --pwd "$GITHUB_WORKSPACE" \
            --env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            --env GPU_ALLOC_SENTINEL="$GPU_ALLOC_SENTINEL" \
            "$SIF" bash <<'CUDA'
          set -ex
          .github/ci/run_gpu_tests.sh
          CUDA
          SCRIPT

      - name: benchmark
        env:
          GPU_ALLOC_SENTINEL: ${{ github.workspace }}/.gpu_alloc_benchmark
        run: |
          rm -f "$GPU_ALLOC_SENTINEL"
          .github/ci/srun_gpu_retry.sh <<SCRIPT
          apptainer exec --nv --fakeroot --containall \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --pwd "$GITHUB_WORKSPACE" \
            --env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            --env GPU_ALLOC_SENTINEL="$GPU_ALLOC_SENTINEL" \
            "$SIF" bash <<'BENCH'
          set -ex
          .github/ci/run_benchmarks.sh
          BENCH
          SCRIPT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            testing.cpu.junit.xml
            testing.cuda.junit.xml
            coverage.xml
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark/**/*
          if-no-files-found: ignore

      - uses: test-summary/action@v2
        if: always()
        with:
          paths: |
            testing.*.junit.xml

      - uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ github.workspace }}/coverage.xml
          fail_ci_if_error: true
