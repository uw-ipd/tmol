# CI pipeline — self-hosted runner on fela (as bench), GPU work via Slurm srun.
#
# Lint runs directly on fela (no GPU needed).
# All GPU work (build, tests, benchmarks) runs inside a single srun allocation
# to avoid re-queuing overhead.

name: CI

on:
  push:
    branches: [master, "kdidi/**"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  #SIF: /net/software/containers/versions/modelhub/pytorch_24.10-py3.sif
  SIF: /home/bench/git_ci_apptainer/tmol.sif
  PIP_PKGS: /net/scratch/bench/ci-pip-pkgs
  

jobs:
  ci:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 720
    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Restore source timestamps
        run: |
          git ls-files -- '*.cpp' '*.cu' '*.cuh' '*.h' '*.hh' '*.cc' | \
            xargs -P8 -I{} bash -c 'ts=$(git log -1 --format="%ct" -- "$1") && touch -d "@$ts" "$1"' _ {}

      - name: Lint
        run: |
          apptainer exec \
            --bind /net/scratch:/net/scratch \
            --bind $PIP_PKGS:/ci-pip-pkgs \
            --pwd $GITHUB_WORKSPACE \
            $SIF bash << 'LINT'
          set -ex
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$PWD:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH
          pre-commit run --all-files --show-diff-on-failure || echo "::warning::pre-commit found issues"
          flake8 || echo "::warning::flake8 found issues"
          LINT

      - name: Build
        id: build
        if: always()
        run: |
          srun --gres=gpu:a6000:1 -p gpu --export=ALL \
                  -t 06:00:00 --cpus-per-task=16 --mem=128G \
                  apptainer exec --nv --fakeroot --containall --bind $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
                  --pwd $GITHUB_WORKSPACE \
                  --env GITHUB_WORKSPACE=$GITHUB_WORKSPACE \
                  $SIF bash << 'BUILD'
          set -ex

          pwd

          python3.10 -m venv .venv
          source .venv/bin/activate

          pip install pip --upgrade
          pip install uv

          uv pip compile pyproject.toml --all-extras --output-file requirements.txt
          grep -vE "^(torch(|vision|audio)|numpy|nvidia-.*|triton|tensorrt|pynvml|pandas|scipy)==" requirements.txt > to_install.txt

          uv pip install -r to_install.txt
          uv pip install torch

          GPU_ARCH=$(python -c "import torch; c=torch.cuda.get_device_capability(0); print(f'{c[0]}{c[1]}')")
          echo "=== Building for GPU architecture: sm_${GPU_ARCH} ==="
          MAX_JOBS=12 pip install -v --no-deps \
                  -Ccmake.define.CMAKE_CUDA_ARCHITECTURES="${GPU_ARCH}" \
                  -Ccmake.define.TMOL_BUILD_TESTS=ON \
                  -Ccmake.define.TMOL_NVCC_THREADS=2 \
                  -e .

          BUILD

      - name: Test CPU
        id: cpu
        if: always() && steps.build.outcome == 'success'
        run: |
          # ── Test CPU ───────────────────────────────────────────────────
          echo "=== tests (CPU only) ==="
          srun --gres=gpu:a6000:1 -p gpu --export=ALL \
                  -t 06:00:00 --cpus-per-task=16 --mem=128G \
                  apptainer exec --nv --fakeroot --containall --bind $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
                  --pwd $GITHUB_WORKSPACE \
                  --env GITHUB_WORKSPACE=$GITHUB_WORKSPACE \
              $SIF bash << 'CPU_TEST'
          set -ex
          
          source .venv/bin/activate
          
          CUDA_VISIBLE_DEVICES="" pytest -p no:rerunfailures -s -v --durations=25 \
            --cov=$GITHUB_WORKSPACE/tmol.cov --junitxml=$GITHUB_WORKSPACE/testing.cpu.junit.xml -k "not cuda"

          CPU_TEST

      - name: Test CUDA
        id: cuda
        if: always() && steps.build.outcome == 'success'
        run: |
          # ── Test CUDA ──────────────────────────────────────────────────
          echo "=== tests (CUDA) ==="
          srun --gres=gpu:a6000:1 -p gpu --export=ALL \
                -t 06:00:00 --cpus-per-task=16 --mem=128G \
                apptainer exec --nv --fakeroot --containall --bind $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
                --pwd $GITHUB_WORKSPACE \
                --env GITHUB_WORKSPACE=$GITHUB_WORKSPACE \
              $SIF bash << 'GPU_TEST'
          set -ex
          
          source .venv/bin/activate
          
          pytest -p no:rerunfailures -s -v --durations=25 --cov=$GITHUB_WORKSPACE/tmol.cov \
            --junitxml=$GITHUB_WORKSPACE/testing.cuda.junit.xml -k "cuda"

          GPU_TEST

      - name: Benchmark
        if: always() && steps.build.outcome == 'success'
        run: |
          exit 1
          # ── Benchmark ──────────────────────────────────────────────────
          echo "=== benchmarks ==="
          srun --gres=gpu:a6000:1 -p gpu --export=ALL \
            -t 06:00:00 --cpus-per-task=16 --mem=128G \
            apptainer exec --nv \
              --bind /net/scratch:/net/scratch \
              --bind $PIP_PKGS:/ci-pip-pkgs \
              --pwd $GITHUB_WORKSPACE \
              $SIF bash << 'BENCHMARK'
          set -ex
          
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export PYTHONUSERBASE=/ci-pip-pkgs
          export PATH=/ci-pip-pkgs/bin:$HOME/.local/bin:$PATH
          export PYTHONPATH=$GITHUB_WORKSPACE:/ci-pip-pkgs/lib/python${PYVER}/site-packages:$PYTHONPATH
          
          export CUDA_HOME=${CUDA_HOME:-/usr/local/cuda}
          export CMAKE_PREFIX_PATH=$(python3 -c 'import torch; print(torch.utils.cmake_prefix_path)')

          BENCHMARK_DIR=benchmark/$GITHUB_REPOSITORY/$GITHUB_REF_NAME
          BENCHMARK_RESULT=${BENCHMARK_DIR}/${GITHUB_RUN_NUMBER}.json
          mkdir -p $BENCHMARK_DIR

          pytest -p no:rerunfailures --benchmark-enable --benchmark-only \
            --benchmark-name=short --benchmark-sort=fullname \
            --benchmark-columns=ops,mean,iqr \
            --benchmark-json=${BENCHMARK_RESULT} \
            --benchmark-max-time=.1

          pytest-benchmark compare --name=short --sort=fullname \
            --columns=ops,mean,iqr $(find benchmark -name '*.json')

          BENCHMARK

      - name: Test Summary
        if: always() #&& (steps.cpu.outcome == 'success' || steps.cuda.outcome == 'success')
        uses: test-summary/action@v2
        with:
          paths: |
            testing.*.junit.xml


      
