test_agent: &cuda_test_agent
  agents:
    queue: cuda

test_agent: &cpu_test_agent
  agents:
    queue: nocuda

docker_plugin: &ngc_docker_plugin
  plugins:
    - docker#v5.10.0:
        image: "nvcr.io/nvidia/pytorch:25.06-py3"
        gpus: all
        always-pull: true

steps:
  ### Build extensions and install deps (requires CUDA for nvcc)
  - label: ':electric_plug: Setup'
    command: .buildkite/bin/setup
    << : *cuda_test_agent

  - wait: ~
    continue_on_failure: true

  ### Linting (ruff — no flake8/pre-commit needed)
  - label: ':microscope: Linting'
    command: .buildkite/bin/linting
    << : *cuda_test_agent

  ### Tests — CPU
  - label: ':shrug: Testing - CPU'
    command: .buildkite/bin/testing --cov=./tmol --junitxml=testing.cpu.junit.xml
    artifact_paths:
      - testing.cpu.junit.xml
      - .coverage
    << : *cpu_test_agent

  ### Tests — CUDA
  - label: ':shrug: Testing - CUDA'
    command: .buildkite/bin/testing --cov=./tmol --junitxml=testing.cuda.junit.xml
    artifact_paths:
      - testing.cuda.junit.xml
      - .coverage
    << : *cuda_test_agent

  ### Tests — CPU debug, no numba JIT
  - label: ':shrug: Testing - CPU debug, w/o jit'
    command: .buildkite/bin/testing_debug_no_jit --cov=./tmol --junitxml=testing.cpunojit.junit.xml
    artifact_paths:
      - testing.cpunojit.junit.xml
      - .coverage
    << : *cpu_test_agent

  ### Benchmarks
  - label: ':racehorse: Benchmark'
    command: .buildkite/bin/benchmark --benchmark-max-time=.1
    artifact_paths:
      - benchmark/**/*
    << : *cuda_test_agent

  - wait: ~
    continue_on_failure: true

  - label: ':clipboard: Report'
    plugins:
      - bugcrowd/test-summary#master:
          inputs:
            - label: Testing - CUDA
              artifact_path: testing.cuda.junit.xml
              type: junit
            - label: Testing - CPU
              artifact_path: testing.cpu.junit.xml
              type: junit
          formatter:
              type: details
          run_without_docker: True
    << : *cuda_test_agent

  - label: ':broom: Cleanup'
    command: .buildkite/bin/cleanup
    << : *cuda_test_agent

  - wait: ~
    continue_on_failure: true

  ### NGC Docker pipeline (GPU) — reproducible containerized runs
  - label: ':docker: Setup (NGC)'
    command: .buildkite/bin/setup
    << : *cuda_test_agent
    << : *ngc_docker_plugin

  - label: ':docker: Linting (NGC)'
    command: .buildkite/bin/linting
    << : *cuda_test_agent
    << : *ngc_docker_plugin

  - label: ':docker: Testing - CPU (NGC)'
    command: .buildkite/bin/testing --cov=./tmol --junitxml=testing.cpu.docker.junit.xml
    artifact_paths:
      - testing.cpu.docker.junit.xml
      - .coverage
    << : *cuda_test_agent
    << : *ngc_docker_plugin

  - label: ':docker: Testing - CUDA (NGC)'
    command: .buildkite/bin/testing --cov=./tmol --junitxml=testing.cuda.docker.junit.xml
    artifact_paths:
      - testing.cuda.docker.junit.xml
      - .coverage
    << : *cuda_test_agent
    << : *ngc_docker_plugin

  - label: ':docker: Benchmark (NGC)'
    command: .buildkite/bin/benchmark --benchmark-max-time=.1
    artifact_paths:
      - benchmark/**/*
    << : *cuda_test_agent
    << : *ngc_docker_plugin

  - wait: ~
    continue_on_failure: true

  ### JIT pipeline (GPU) — compile at import time
  - label: ':zap: Setup (JIT)'
    command: TMOL_SKIP_AOT_BUILD=TRUE .buildkite/bin/setup
    << : *cuda_test_agent
    << : *ngc_docker_plugin

  - label: ':zap: Testing - CUDA (JIT)'
    command: TMOL_USE_JIT=1 .buildkite/bin/testing --cov=./tmol --junitxml=testing.cuda.jit.junit.xml
    artifact_paths:
      - testing.cuda.jit.junit.xml
      - .coverage
    << : *cuda_test_agent
    << : *ngc_docker_plugin
