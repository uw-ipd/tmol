cuda_test_agent: &cuda_test_agent
  agents:
    queue: cuda

cpu_test_agent: &cpu_test_agent
  agents:
    queue: nocuda

steps:
  # Setup builds AOT extensions (persists in checkout dir via --inplace)
  - label: ':hammer: Setup'
    command: .buildkite/bin/setup
    <<: *cuda_test_agent

  - label: ':mag: Linting'
    command: .buildkite/bin/linting
    <<: *cuda_test_agent

  - label: ':python: Testing - CPU'
    command: .buildkite/bin/testing --cov=./tmol --junitxml=testing.cpu.junit.xml
    artifact_paths:
      - testing.cpu.junit.xml
      - .coverage
    <<: *cpu_test_agent

  - label: ':gpu: Testing - CUDA'
    command: .buildkite/bin/testing --cov=./tmol --junitxml=testing.cuda.junit.xml
    artifact_paths:
      - testing.cuda.junit.xml
      - .coverage
    <<: *cuda_test_agent

  - label: ':chart_with_upwards_trend: Benchmark'
    command: .buildkite/bin/benchmark --benchmark-max-time=.1
    artifact_paths:
      - benchmark/**/*
    <<: *cuda_test_agent

  - wait: ~
    continue_on_failure: true

  # JIT — TMOL_USE_JIT=1 skips precompiled extensions, no separate setup needed
  - label: ':zap: Testing - CUDA (JIT)'
    command: TMOL_USE_JIT=1 .buildkite/bin/testing --cov=./tmol --junitxml=testing.cuda.jit.junit.xml
    artifact_paths:
      - testing.cuda.jit.junit.xml
      - .coverage
    <<: *cuda_test_agent
