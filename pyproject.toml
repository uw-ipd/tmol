[project]
name = "tmol"
description = "GPU-accelerated PyTorch reimplementation of the Rosetta energy function"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "Institute for Protein Design", email = "contact@ipd.uw.edu" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]
version = "0.1.1"

dependencies = [
    # Core ML framework
    "torch>=2.5,<3",
    "numpy>=1.26,<3",
    "scipy>=1.12,<2",
    # Data structures & serialization
    "attrs>=23.2,<26",
    "attrs_strict>=1.0,<2",
    "cattrs>=23.2,<25",
    "frozendict>=2.4,<3",
    "pandas>=2.2,<3",
    "pyarrow>=15,<23", 
    "pyyaml>=6.0,<7",
    # Graphs & algorithms
    "networkx>=3.2,<4",
    # Utilities
    "toolz>=0.12,<1",
    "decorator>=5.1,<6",
    "typing_extensions>=4.9,<5",
    "typing_inspect>=0.9,<1",
    "pint>=0.23,<1",
    "psutil>=5.9,<8",
    "requests>=2.31,<3",
    # Sparse arrays (requires SPARSE_AUTO_DENSIFY=1 for sparse>0.3.1)
    "sparse>=0.16,<1",
    # numba/llvmlite must be recent enough for Python 3.12+
    "numba>=0.59,<1",
    "llvmlite>=0.42,<1",
    # Testing (hypothesis is used at runtime for property-based data generation)
    "hypothesis>=6.98,<7",
    # AST manipulation (used by tmol.utility.args)
    "astor>=0.8,<1",
    # Interactive
    "ipython>=8.21",
]

[project.optional-dependencies]
dev = [
    # Linters & formatters
    "ruff>=0.8,<1",
    "pre-commit>=4.0,<5",
    "clang-format>=17,<19",
    # Testing
    "pytest>=8.0,<9",
    "pytest-cov>=4.1,<7",
    "pytest-benchmark>=5.1,<6",
    "pytest-forked>=1.6,<2",
    "pytest-instafail>=0.5,<1",
    "pytest-repeat>=0.9,<1",
    "pytest-watch>=4.2,<5",
    # Visualization
    "seaborn>=0.13,<1",
]
cuda = [
    # CUDA nvcc compiler for JIT compilation of custom kernels.
    # Only the unsuffixed (cu13) package ships the full nvcc binary;
    # nvidia-cuda-nvcc-cu12 only contains ptxas.
    "nvidia-cuda-nvcc>=13,<14",
    # CCCL headers (nv/target, cub/, thrust/) needed by nvcc
    "nvidia-cuda-cccl>=13,<14",
]

[project.urls]
repository = "https://github.com/uw-ipd/tmol"

# Build settings ---------------------------------------------------------------
[build-system]
requires = ["setuptools>=68", "wheel", "torch>=2.5", "ninja", "psutil", "packaging"]
build-backend = "setuptools.build_meta"

[tool.uv.extra-build-dependencies]
tmol = ["torch>=2.5"]

[tool.setuptools]
packages = { find = { include = ["tmol*"] } }

[tool.setuptools.package-data]
"tmol" = [
    # Database YAML
    "database/default/chemical/**/*.yaml",
    "database/default/scoring/**/*.yaml",
    # Test fixture data
    "tests/data/pdb/**/*.pdb",
    "tests/data/rosetta_baselines/**/*.pickle",
    "tests/data/constraints/**/*.fa",
    "tests/data/constraints/**/*.npz",
]

# Code style settings ----------------------------------------------------------
[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py310"
exclude = [
    "tmol/extern/",
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "env",
    "venv",
    "dev",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 120

[tool.ruff.lint]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
extend-select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # Ruff-specific rules
    "T10", # catch accidental debugger breakpoints
]
ignore = [
    "B006",   # mutable default arguments
    "E501",   # line too long (handled by formatter)
    "SIM108", # ternary operator suggestions
    "E741",   # ambiguous variable names (common in scientific code)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tmol/tests/*" = ["D", "E", "RUF"]
"setup.py" = ["E402"]  # torch must be imported after setuptools

# Test settings ----------------------------------------------------------------
[tool.pytest.ini_options]
addopts = "--benchmark-disable --benchmark-columns=ops,mean,iqr"
filterwarnings = [
    "ignore:(?s).*is not compatible with the compiler Pytorch.*:",
    "ignore:(?s).*Benchmark fixture was not used.*:",
    "ignore:(?s).*one of the inputs that requires gradient is not of double precision.*:",
    "ignore:(?s).*Distutils was imported before Setuptools*:",
    "ignore:(?s).*To copy construct from a tensor, it is recommended to use*:",
    "ignore:(?s).*pkg_resources is deprecated*:",
    "ignore:(?s).*Deprecated call to `pkg_resources.declare_namespace*:",
]

[tool.pytest-watch]
ext = ".cpp,.hh,.h,.cu,.py,.yaml"
